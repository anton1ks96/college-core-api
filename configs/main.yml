server:
  host: "0.0.0.0"
  port: 8081
  maxHeaderBytes: 1
  readTimeout: 30s
  writeTimeout: 30s

database:
  maxConnections: 25
  maxIdle: 5
  connMaxLifetime: 5m

minio:
  bucket: "college-rag-svc"
  useSSL: false

auth_service:
  timeout: 5s

llm:
  timeout: 5m

tei:
  timeout: 30s

limits:
  maxFileSize: 10485760   # 10MB
  uploadRateLimit: 5      # per minute
  askRateLimit: 20        # per minute

rag:
  searchTopK: 10
  rerankTopN: 4
  llmTemperature: 0.7
  llmMaxTokens: 4096
  vectorSize: 1024        # BAAI/bge-m3
